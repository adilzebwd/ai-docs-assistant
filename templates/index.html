<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Docs Assistant</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f5f7;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 640px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow: hidden;
        }

        .chat-header {
            background: #1f2937;
            color: #fff;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header span {
            display: block;
            font-size: 12px;
            font-weight: 400;
            color: #9ca3af;
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            align-self: flex-start;
            background: #f1f3f5;
            color: #1f2937;
            border-bottom-left-radius: 2px;
        }

        .sources {
            align-self: flex-start;
            font-size: 11px;
            color: #9ca3af;
            margin-top: -8px;
            max-width: 80%;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #e5e7eb;
            padding: 12px;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #2563eb;
        }

        .chat-input button {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
        }

        .chat-input button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .typing {
            align-self: flex-start;
            font-size: 13px;
            color: #9ca3af;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            AI Docs Assistant
            <span id="docLabel">Loading document info...</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="questionInput" placeholder="Type your question..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById("chatMessages");
        const questionInput = document.getElementById("questionInput");
        const sendBtn = document.getElementById("sendBtn");

        function addMessage(text, sender) {
            const msg = document.createElement("div");
            msg.className = "message " + sender;
            msg.textContent = text;
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msg;
        }

        function addSources(sources) {
            if (!sources || sources.length === 0) return;
            const src = document.createElement("div");
            src.className = "sources";
            const list = sources
                .map(s => `${s.source} #${s.chunk_id} (score ${s.score})`)
                .join(", ");
            src.textContent = "Sources: " + list;
            chatMessages.appendChild(src);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addTypingIndicator() {
            const typing = document.createElement("div");
            typing.className = "typing";
            typing.id = "typingIndicator";
            typing.textContent = "Assistant is thinking...";
            chatMessages.appendChild(typing);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById("typingIndicator");
            if (typing) typing.remove();
        }

        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            addMessage(question, "user");
            questionInput.value = "";
            sendBtn.disabled = true;
            addTypingIndicator();

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();
                removeTypingIndicator();

                if (data.error) {
                    addMessage("Error: " + data.error, "bot");
                } else {
                    addMessage(data.answer, "bot");
                    addSources(data.sources);
                }
            } catch (err) {
                removeTypingIndicator();
                addMessage("Something went wrong. Please try again.", "bot");
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }

        sendBtn.addEventListener("click", sendQuestion);
        questionInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendQuestion();
        });

        async function loadDocumentInfo() {
            const docLabel = document.getElementById("docLabel");
            try {
                const response = await fetch("/current-document");
                const data = await response.json();
                docLabel.textContent = data.filename
                    ? `Document: ${data.filename}`
                    : "No document uploaded yet";
            } catch (err) {
                docLabel.textContent = "Ask a question about the document";
            }
        }

        loadDocumentInfo();
        addMessage("Hi! Ask me anything about the document.", "bot");
    </script>

</body>

</html>
